<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Blitz Planning</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #252540;
      --border: #2e2e50; --accent: #f59e0b; --accent2: #10b981;
      --danger: #ef4444; --text: #e2e8f0; --text2: #94a3b8; --radius: 10px;
    }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }

    #app { display: flex; flex-direction: column; height: 100%; }
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    header h1 span { color: var(--text2); font-weight: 400; font-size: 0.85rem; margin-left: 8px; }
    .header-actions { margin-left: auto; display: flex; gap: 8px; }
    #main { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    #sidebar {
      width: 380px; min-width: 280px; display: flex; flex-direction: column;
      background: var(--surface); border-right: 1px solid var(--border);
      overflow: hidden; flex-shrink: 0;
    }
    #sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
    #sidebar-tabs { display: flex; gap: 6px; }
    .tab-btn {
      flex: 1; padding: 7px 12px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text2); border-radius: 6px;
      cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all 0.15s;
    }
    .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
    #filter-row { display: flex; gap: 8px; }
    #search-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 0.85rem;
    }
    #search-input::placeholder { color: var(--text2); }
    #status-filter { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 0 4px; }
    .status-pill {
      padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
      border: 1px solid var(--border); background: var(--surface2); color: var(--text2);
      cursor: pointer; white-space: nowrap; transition: all 0.15s;
    }
    .status-pill.active { background: var(--accent); color: #000; border-color: var(--accent); }
    #ticket-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }

    /* Ticket card */
    .ticket-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px; transition: border-color 0.15s;
      user-select: none;
    }
    .ticket-card:hover { border-color: var(--accent); }
    .ticket-card.in-planning { border-color: var(--accent2); background: #0d2b22; }
    .ticket-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
    .ticket-number { font-size: 0.75rem; color: var(--accent); font-weight: 700; font-family: monospace; }
    .status-badge {
      font-size: 0.68rem; padding: 2px 6px; border-radius: 4px; font-weight: 600;
      background: var(--surface); border: 1px solid var(--border); color: var(--text2);
    }
    .priority-badge { font-size: 0.68rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
    .priority-high { background: #7f1d1d; color: #fca5a5; }
    .priority-medium { background: #78350f; color: #fcd34d; }
    .priority-low { background: #14532d; color: #86efac; }
    .ticket-subject { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; line-height: 1.3; }
    .ticket-account { font-size: 0.8rem; color: var(--text2); margin-bottom: 4px; }
    .ticket-address { font-size: 0.78rem; color: var(--accent); display: flex; align-items: center; gap: 4px; }
    .ticket-address.missing { color: var(--danger); }
    .ticket-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .btn-sm {
      padding: 5px 10px; border-radius: 5px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; border: none; transition: opacity 0.15s;
    }
    .btn-sm:hover { opacity: 0.85; }
    .btn-add { background: var(--accent2); color: #fff; }
    .btn-remove { background: var(--danger); color: #fff; }
    .btn-edit { background: var(--surface); color: var(--text); border: 1px solid var(--border) !important; }

    /* Planning panel */
    #planning-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #planning-header {
      padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    #planning-header h2 { font-size: 0.95rem; font-weight: 700; }
    #date-picker, #origin-input {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 6px 10px; border-radius: 6px; font-size: 0.85rem;
    }
    #origin-input { width: 200px; }
    .btn-primary {
      background: var(--accent); color: #000; border: none; padding: 7px 16px;
      border-radius: 6px; font-weight: 700; font-size: 0.85rem; cursor: pointer;
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      padding: 7px 14px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; cursor: pointer;
    }
    #planning-content { flex: 1; display: flex; overflow: hidden; }

    /* Route list */
    #route-list {
      width: 340px; flex-shrink: 0; overflow-y: auto; padding: 10px;
      display: flex; flex-direction: column; gap: 6px;
      background: var(--surface); border-right: 1px solid var(--border);
    }
    .route-stop {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .route-stop.drag-over { border-color: var(--accent); background: #2a2a10; }
    .stop-number {
      background: var(--accent); color: #000; border-radius: 50%;
      width: 26px; height: 26px; display: flex; align-items: center;
      justify-content: center; font-weight: 800; font-size: 0.8rem; flex-shrink: 0;
    }
    .stop-info { flex: 1; min-width: 0; }
    .stop-subject { font-weight: 600; font-size: 0.88rem; margin-bottom: 3px; }
    .stop-account { font-size: 0.78rem; color: var(--text2); margin-bottom: 3px; }
    .stop-address { font-size: 0.78rem; color: var(--accent); }
    .stop-actions { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
    .btn-nav {
      background: var(--accent2); color: #fff; border: none;
      padding: 6px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer;
    }
    .btn-icon {
      background: var(--surface); border: 1px solid var(--border); color: var(--text2);
      padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    .leg-connector {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 10px; color: var(--text2); font-size: 0.75rem;
    }
    .leg-connector::before { content: ''; display: block; width: 2px; height: 20px; background: var(--border); margin-left: 12px; }

    /* Map */
    #map-container { flex: 1; position: relative; min-height: 200px; }
    #map { width: 100%; height: 100%; min-height: 200px; }

    /* Day summary */
    #day-summary {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 10px 16px; display: flex; gap: 20px; flex-wrap: wrap;
      font-size: 0.8rem; color: var(--text2);
    }
    #day-summary span b { color: var(--text); }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; color: var(--text2); text-align: center; padding: 40px;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state h3 { color: var(--text); font-size: 1rem; }

    /* Kalender */
    #calendar-view {
      display: none; flex: 1; overflow-y: auto; padding: 12px 8px;
      flex-direction: column; gap: 6px;
    }
    .cal-week-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 4px 12px; gap: 8px;
    }
    .cal-week-nav span { font-size: 0.9rem; font-weight: 700; color: var(--text); }
    .cal-week-nav button {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 1rem;
    }
    .cal-day-group { margin-bottom: 8px; }
    .cal-day-header {
      font-size: 0.78rem; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 6px 4px 4px; border-bottom: 1px solid var(--border); margin-bottom: 6px;
    }
    .cal-day-header.today { color: var(--accent2); }
    .cal-day-header.overdue { color: var(--danger); }
    .cal-ticket {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px;
    }
    .cal-ticket-subject { font-weight: 600; font-size: 0.88rem; margin-bottom: 3px; }
    .cal-ticket-meta { font-size: 0.78rem; color: var(--text2); }
    .cal-ticket-status {
      display: inline-block; font-size: 0.68rem; padding: 2px 6px; border-radius: 4px;
      background: var(--surface); border: 1px solid var(--border); color: var(--text2); margin-top: 4px;
    }
    .cal-empty { color: var(--text2); font-size: 0.85rem; text-align: center; padding: 40px 20px; }

    /* Modals */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 24px; width: 100%; max-width: 480px; margin: 20px;
    }
    .modal-box h3 { margin-bottom: 8px; font-size: 1rem; }
    .modal-subtitle { font-size: 0.8rem; color: var(--text2); margin-bottom: 14px; }
    .modal-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 12px; border-radius: 6px;
      font-size: 0.9rem; margin-bottom: 16px; font-family: inherit;
    }
    textarea.modal-input { min-height: 100px; resize: vertical; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* Loading */
    #loading {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 2000; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; color: var(--text);
    }
    #loading.show { display: flex; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 10px 20px; border-radius: 8px; font-size: 0.85rem;
      z-index: 3000; opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* Mobile */
    @media (max-width: 768px) {
      html, body { height: auto; overflow: auto; }
      #app { height: auto; min-height: 100dvh; }
      #main { flex-direction: column; overflow: visible; height: auto; }

      #sidebar {
        width: 100%; border-right: none; border-bottom: 1px solid var(--border);
        max-height: none; overflow: visible;
      }
      #ticket-list { max-height: none; overflow: visible; }
      #calendar-view { max-height: none; overflow: visible; }

      #planning-panel { min-height: auto; overflow: visible; }
      #planning-content { flex-direction: column; overflow: visible; }
      #route-list {
        width: 100%; border-right: none; border-bottom: 1px solid var(--border);
        max-height: none; overflow: visible;
      }
      #map-container { height: 300px; }
      #map { height: 300px; }

      #origin-input { width: 100%; }
    }
  </style>
</head>
<body>

<div id="app">
  <header>
    <h1>⚡ Blitz Planning <span id="header-date"></span></h1>
    <div class="header-actions">
      <button class="btn-secondary" onclick="loadTickets()">🔄 Vernieuwen</button>
    </div>
  </header>

  <div id="main">
    <div id="sidebar">
      <div id="sidebar-header">
        <div id="sidebar-tabs">
          <button class="tab-btn active" onclick="setTab('tickets')" id="tab-tickets">📋 (<span id="ticket-count">0</span>)</button>
          <button class="tab-btn" onclick="setTab('planning')" id="tab-planning">🗓️ (<span id="planning-count">0</span>)</button>
          <button class="tab-btn" onclick="setTab('kalender')" id="tab-kalender">📅 (<span id="planned-count">0</span>)</button>
        </div>
        <div id="filter-row">
          <input id="search-input" type="search" placeholder="Zoek ticket, klant, adres..." oninput="renderTickets(filterCurrentTickets())" />
        </div>
        <div id="status-filter">
          <button class="status-pill active" onclick="setStatusFilter('all')" id="spill-all">Alle</button>
          <button class="status-pill" onclick="setStatusFilter('Wachten op planning')" id="spill-wop">Te plannen</button>
          <button class="status-pill" onclick="setStatusFilter('Wachten op bevestiging planning')" id="spill-wbp">Ter bevestiging</button>
        </div>
      </div>
      <div id="ticket-list"></div>
      <div id="calendar-view"></div>
    </div>

    <div id="planning-panel">
      <div id="planning-header">
        <h2>🗺️ Dagroute</h2>
        <input type="date" id="date-picker" onchange="updateDate(this.value)" />
        <input type="text" id="origin-input" placeholder="Vertrekpunt (adres)" value="Blitz Power, Geel" />
        <button class="btn-primary" onclick="optimizeRoute()" id="optimize-btn" disabled>⚡ Optimaliseer</button>
        <button class="btn-secondary" onclick="calculateRoute()" id="route-btn" disabled>🔄 Bereken</button>
      </div>
      <div id="planning-content">
        <div id="route-list">
          <div class="empty-state" id="route-empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
            <h3>Geen stops gepland</h3>
            <p>Voeg tickets toe vanuit de lijst</p>
          </div>
        </div>
        <div id="map-container"><div id="map"></div></div>
      </div>
      <div id="day-summary">
        <span>Stops: <b id="sum-stops">0</b></span>
        <span>Afstand: <b id="sum-distance">—</b></span>
        <span>Rijtijd: <b id="sum-time">—</b></span>
        <span>Vertraging: <b id="sum-delay">—</b></span>
        <span>ETA laatste stop: <b id="sum-eta">—</b></span>
      </div>
    </div>
  </div>
</div>

<!-- Oplossing modal -->
<div id="comment-overlay" class="modal-overlay" onclick="closeCommentModal(event)">
  <div class="modal-box">
    <h3>✅ Oplossing invoeren</h3>
    <div id="comment-ticket-label" class="modal-subtitle"></div>
    <textarea id="comment-textarea" class="modal-input" placeholder="Beschrijf de oplossing of uitgevoerde interventie..."></textarea>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeCommentModal()">Annuleren</button>
      <button class="btn-primary" onclick="submitComment()">Opslaan in Zoho</button>
    </div>
  </div>
</div>

<!-- Adres modal -->
<div id="address-overlay" class="modal-overlay" onclick="closeAddressModal(event)">
  <div class="modal-box">
    <h3>📍 Adres bewerken</h3>
    <input id="address-input" class="modal-input" type="text" placeholder="Volledig adres, stad" />
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeAddressModal()">Annuleren</button>
      <button class="btn-primary" onclick="saveAddress()">Opslaan</button>
    </div>
  </div>
</div>

<div id="loading"><div class="spinner"></div><span id="loading-text">Laden...</span></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let allTickets = [];
let allPlannedTickets = [];
let planningTickets = [];
let routeData = null;
let leafletMap, routeLayer;
let editingTicketId = null;
let editCallback = null;
let commentTicketId = null;
let currentTab = 'tickets';
let currentStatusFilter = 'all';
let calendarWeekOffset = 0;
const addressOverrides = JSON.parse(localStorage.getItem('addressOverrides') || '{}');
const savedPlanning = JSON.parse(localStorage.getItem('savedPlanning') || '{}');

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  const picker = document.getElementById('date-picker');
  picker.value = new Date().toISOString().split('T')[0];
  document.getElementById('header-date').textContent = formatDate(picker.value);
  loadTickets();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
});

function updateDate(val) {
  document.getElementById('header-date').textContent = formatDate(val);
  loadSavedPlanningForDate(val);
}

function formatDate(val) {
  return new Date(val + 'T12:00:00').toLocaleDateString('nl-BE', { weekday: 'long', day: 'numeric', month: 'long' });
}

// ══════════════════════════════════════════════
// MAP
// ══════════════════════════════════════════════
function initMap() {
  leafletMap = L.map('map', { zoomControl: true }).setView([51.0, 4.5], 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom: 18,
  }).addTo(leafletMap);
  routeLayer = L.layerGroup().addTo(leafletMap);
}

function updateMap() {
  routeLayer.clearLayers();
  if (planningTickets.length === 0) return;

  if (routeData?.polyline?.length) {
    const poly = L.polyline(routeData.polyline, { color: '#f59e0b', weight: 4, opacity: 0.8 }).addTo(routeLayer);
    leafletMap.fitBounds(poly.getBounds(), { padding: [30, 30] });
  }

  const points = [];
  planningTickets.forEach((item, i) => {
    if (item._lat && item._lon) {
      L.marker([item._lat, item._lon], { icon: createNumberIcon(i + 1) })
        .bindPopup(`<b>#${i+1} ${item.ticket.subject}</b><br>${item.address}`)
        .addTo(routeLayer);
      points.push([item._lat, item._lon]);
    }
  });

  if (points.length > 0 && !routeData?.polyline?.length) {
    leafletMap.fitBounds(L.latLngBounds(points), { padding: [40, 40] });
  }
}

function createNumberIcon(n) {
  return L.divIcon({
    html: `<div style="background:#f59e0b;color:#000;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;border:2px solid #000;box-shadow:0 2px 6px rgba(0,0,0,0.4)">${n}</div>`,
    iconSize: [28, 28], iconAnchor: [14, 14], className: '',
  });
}

// ══════════════════════════════════════════════
// TICKETS
// ══════════════════════════════════════════════
async function loadTickets() {
  showLoading('Tickets laden uit Zoho Desk...');
  try {
    const res = await fetch('/api/tickets');
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    allTickets = data.tickets.map(t => ({ ...t, address: addressOverrides[t.id] || t.address || '' }));
    allPlannedTickets = (data.plannedTickets || []).map(t => ({ ...t, address: addressOverrides[t.id] || t.address || '' }));

    document.getElementById('ticket-count').textContent = allTickets.length;
    document.getElementById('planned-count').textContent = allPlannedTickets.length;

    if (currentTab === 'tickets') renderTickets(filterCurrentTickets());
    else if (currentTab === 'kalender') renderCalendar();

    toast(`${allTickets.length} te plannen · ${allPlannedTickets.length} gepland`);
    loadSavedPlanningForDate(document.getElementById('date-picker').value);
  } catch (err) {
    toast('❌ ' + err.message, 4000);
    loadDemoTickets();
  } finally {
    hideLoading();
  }
}

function loadDemoTickets() {
  allTickets = [
    { id: '1', number: '1001', subject: 'CHARX laadpaal offline', account: 'Q-Park Antwerpen', priority: 'high', address: 'Koningin Astridplein, 2018 Antwerpen', status: 'Wachten op planning', contact: '', dueDate: null },
    { id: '2', number: '1002', subject: 'Firmware update SEC-3100', account: 'Apcoa Parking Gent', priority: 'medium', address: 'Korenmarkt 1, 9000 Gent', status: 'Wachten op planning', contact: '', dueDate: null },
    { id: '3', number: '1003', subject: "Connector kapot poort 3", account: 'Brugge Parking', priority: 'high', address: 'Markt 1, 8000 Brugge', status: 'Wachten op bevestiging planning', contact: '', dueDate: null },
  ];
  document.getElementById('ticket-count').textContent = allTickets.length;
  renderTickets(filterCurrentTickets());
  toast('Demo-modus actief', 3000);
}

function renderTickets(tickets) {
  const list = document.getElementById('ticket-list');
  const inPlanningIds = new Set(planningTickets.map(p => p.ticket.id));

  if (tickets.length === 0) {
    list.innerHTML = '<div class="empty-state"><h3>Geen tickets gevonden</h3></div>';
    return;
  }

  list.innerHTML = '';
  tickets.forEach(ticket => {
    const inPlanning = inPlanningIds.has(ticket.id);
    const hasAddress = !!ticket.address;
    // Safe encode for data attributes
    const safeSubject = (ticket.subject || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');

    const card = document.createElement('div');
    card.className = `ticket-card${inPlanning ? ' in-planning' : ''}`;
    card.innerHTML = `
      <div class="ticket-meta">
        <span class="ticket-number">#${ticket.number}</span>
        ${ticket.priority ? `<span class="priority-badge priority-${ticket.priority.toLowerCase()}">${ticket.priority}</span>` : ''}
        <span class="status-badge">${ticket.status || ''}</span>
        ${inPlanning ? '<span style="font-size:0.75rem;color:var(--accent2)">✓ Gepland</span>' : ''}
      </div>
      <div class="ticket-subject">${ticket.subject || ''}</div>
      ${ticket.account || ticket.contact ? `<div class="ticket-account">${[ticket.account, ticket.contact].filter(Boolean).join(' · ')}</div>` : ''}
      <div class="ticket-address ${!hasAddress ? 'missing' : ''}">
        📍 ${hasAddress ? ticket.address : 'Geen adres — klik Adres om toe te voegen'}
      </div>
      <div class="ticket-actions">
        ${inPlanning
          ? `<button class="btn-sm btn-remove" onclick="removeFromPlanning('${ticket.id}')">✕ Verwijder</button>`
          : `<button class="btn-sm btn-add" onclick="addToPlanning('${ticket.id}')">+ Voeg toe</button>`
        }
        <button class="btn-sm btn-edit" onclick="openAddressModal('${ticket.id}')">📍 Adres</button>
        <button class="btn-sm btn-edit" data-ticket-id="${ticket.id}" data-subject="${safeSubject}" onclick="openCommentFromBtn(this)">✏️ Oplossing</button>
      </div>
    `;
    list.appendChild(card);
  });
}

function filterCurrentTickets() {
  const q = document.getElementById('search-input').value.toLowerCase();
  return allTickets.filter(t => {
    if (currentStatusFilter !== 'all' && t.status !== currentStatusFilter) return false;
    if (!q) return true;
    return (t.subject || '').toLowerCase().includes(q) ||
           (t.account || '').toLowerCase().includes(q) ||
           (t.address || '').toLowerCase().includes(q) ||
           (t.number || '').toString().includes(q);
  });
}

function setStatusFilter(status) {
  currentStatusFilter = status;
  const pillMap = { all: 'spill-all', 'Wachten op planning': 'spill-wop', 'Wachten op bevestiging planning': 'spill-wbp' };
  document.querySelectorAll('.status-pill').forEach(p => p.classList.remove('active'));
  document.getElementById(pillMap[status])?.classList.add('active');
  renderTickets(filterCurrentTickets());
}

// ══════════════════════════════════════════════
// PLANNING
// ══════════════════════════════════════════════
function addToPlanning(ticketId) {
  const ticket = allTickets.find(t => t.id === ticketId);
  if (!ticket || planningTickets.find(p => p.ticket.id === ticketId)) return;

  if (!ticket.address) {
    openAddressModal(ticketId, () => {
      planningTickets.push({ ticket, address: ticket.address });
      afterPlanningChange();
    });
    return;
  }
  planningTickets.push({ ticket, address: ticket.address });
  afterPlanningChange();
}

function removeFromPlanning(ticketId) {
  planningTickets = planningTickets.filter(p => p.ticket.id !== ticketId);
  afterPlanningChange();
}

function afterPlanningChange() {
  document.getElementById('planning-count').textContent = planningTickets.length;
  document.getElementById('sum-stops').textContent = planningTickets.length;
  document.getElementById('optimize-btn').disabled = planningTickets.length < 2;
  document.getElementById('route-btn').disabled = planningTickets.length < 1;
  renderRouteList();
  if (currentTab === 'tickets') renderTickets(filterCurrentTickets());
  else if (currentTab === 'planning') renderPlanningTab();
  savePlanningForDate();
  routeData = null;
  updateMap();
  clearRouteSummary();
}

function renderRouteList() {
  const routeList = document.getElementById('route-list');
  const routeEmpty = document.getElementById('route-empty');

  if (planningTickets.length === 0) {
    routeList.innerHTML = '';
    routeList.appendChild(routeEmpty);
    routeEmpty.style.display = '';
    return;
  }
  routeEmpty.style.display = 'none';
  routeList.innerHTML = '';

  planningTickets.forEach((item, i) => {
    if (i > 0 && routeData?.legs?.[i - 1]) {
      const leg = routeData.legs[i - 1];
      const mins = Math.round(leg.travelTimeSeconds / 60);
      const delay = leg.trafficDelaySeconds > 60 ? ` (+${Math.round(leg.trafficDelaySeconds / 60)}' vertraging)` : '';
      const conn = document.createElement('div');
      conn.className = 'leg-connector';
      conn.innerHTML = `🚗 ${mins} min · ${(leg.distanceMeters / 1000).toFixed(1)} km${delay}`;
      routeList.appendChild(conn);
    }

    const safeSubject = (item.ticket.subject || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    const stop = document.createElement('div');
    stop.className = 'route-stop';
    stop.dataset.index = i;
    stop.innerHTML = `
      <div class="stop-number">${i + 1}</div>
      <div class="stop-info">
        <div class="stop-subject">${item.ticket.subject || ''}</div>
        <div class="stop-account">${item.ticket.account || ''}</div>
        <div class="stop-address">📍 ${item.address}</div>
      </div>
      <div class="stop-actions">
        <button class="btn-nav" onclick="navigate('${encodeURIComponent(item.address)}')">🧭 Nav</button>
        <button class="btn-icon" data-ticket-id="${item.ticket.id}" data-subject="${safeSubject}" onclick="openCommentFromBtn(this)" title="Oplossing">✏️</button>
        <button class="btn-icon" onclick="openAddressModal('${item.ticket.id}')" title="Adres">📍</button>
        <button class="btn-icon" onclick="removeFromPlanning('${item.ticket.id}')" title="Verwijder">✕</button>
      </div>
    `;

    // Touch-friendly drag & drop (desktop only, touch scroll is more important on mobile)
    if (window.innerWidth > 768) {
      stop.draggable = true;
      stop.style.cursor = 'grab';
      stop.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', i); stop.style.opacity = '0.4'; });
      stop.addEventListener('dragend', () => { stop.style.opacity = ''; });
      stop.addEventListener('dragover', e => { e.preventDefault(); stop.classList.add('drag-over'); });
      stop.addEventListener('dragleave', () => stop.classList.remove('drag-over'));
      stop.addEventListener('drop', e => {
        e.preventDefault();
        stop.classList.remove('drag-over');
        const from = parseInt(e.dataTransfer.getData('text/plain'));
        if (from !== i) {
          const moved = planningTickets.splice(from, 1)[0];
          planningTickets.splice(i, 0, moved);
          routeData = null;
          afterPlanningChange();
          calculateRoute();
        }
      });
    }

    routeList.appendChild(stop);
  });
}

function renderPlanningTab() {
  const list = document.getElementById('ticket-list');
  list.innerHTML = '';
  if (planningTickets.length === 0) {
    list.innerHTML = '<div class="empty-state"><h3>Nog niets ingepland</h3><p>Voeg tickets toe via de 📋 tab</p></div>';
    return;
  }
  planningTickets.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'ticket-card in-planning';
    card.innerHTML = `
      <div class="ticket-meta">
        <span style="background:var(--accent);color:#000;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:0.75rem">${i+1}</span>
        <span class="ticket-number">#${item.ticket.number}</span>
      </div>
      <div class="ticket-subject">${item.ticket.subject || ''}</div>
      <div class="ticket-address">📍 ${item.address || 'Geen adres'}</div>
      <div class="ticket-actions">
        <button class="btn-nav" onclick="navigate('${encodeURIComponent(item.address)}')">🧭 Navigeer</button>
        <button class="btn-sm btn-remove" onclick="removeFromPlanning('${item.ticket.id}')">✕</button>
      </div>
    `;
    list.appendChild(card);
  });
}

function navigate(encodedAddress) {
  const address = decodeURIComponent(encodedAddress);
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(address)}&travelmode=driving`, '_blank');
}

// ══════════════════════════════════════════════
// ROUTE & OPTIMIZE
// ══════════════════════════════════════════════
async function optimizeRoute() {
  const origin = document.getElementById('origin-input').value.trim();
  if (!origin || planningTickets.length < 2) return;
  showLoading('Route optimaliseren...');
  try {
    const res = await fetch('/api/optimize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ origin, stops: planningTickets.map(p => p.address) }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    planningTickets = data.optimizedOrder.map(i => ({
      ...planningTickets[i],
      _lat: data.locations[i + 1]?.lat,
      _lon: data.locations[i + 1]?.lon,
    }));
    toast('Route geoptimaliseerd ✓');
    afterPlanningChange();
    await calculateRoute();
  } catch (err) {
    toast('❌ Optimalisatie: ' + err.message, 4000);
    await calculateRoute();
  } finally {
    hideLoading();
  }
}

async function calculateRoute() {
  if (planningTickets.length === 0) return;
  showLoading('Route berekenen...');
  try {
    const origin = document.getElementById('origin-input').value.trim();
    if (!origin) { hideLoading(); return toast('Vul een vertrekpunt in'); }

    // Geocode stops without coordinates
    if (planningTickets.some(p => !p._lat)) {
      const geoRes = await fetch('/api/optimize', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ origin, stops: planningTickets.map(p => p.address) }),
      });
      const geoData = await geoRes.json();
      if (!geoData.error && geoData.locations) {
        planningTickets.forEach((p, i) => {
          p._lat = p._lat || geoData.locations[i + 1]?.lat;
          p._lon = p._lon || geoData.locations[i + 1]?.lon;
        });
      }
    }

    // Geocode origin
    const orgRes = await fetch('/api/optimize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ origin, stops: [origin] }),
    });
    const orgData = await orgRes.json();
    const originLoc = orgData.locations?.[0];
    if (!originLoc) throw new Error('Kon vertrekpunt niet geocoden');

    const waypoints = [
      { lat: originLoc.lat, lon: originLoc.lon },
      ...planningTickets.filter(p => p._lat).map(p => ({ lat: p._lat, lon: p._lon })),
    ];
    if (waypoints.length < 2) { hideLoading(); return; }

    const res = await fetch('/api/route', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ waypoints }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    routeData = data;
    updateRouteSummary(data);
    updateMap();
    renderRouteList();
    toast('Route berekend ✓');
  } catch (err) {
    toast('❌ Route: ' + err.message, 4000);
    updateMap();
  } finally {
    hideLoading();
  }
}

function updateRouteSummary(data) {
  document.getElementById('sum-distance').textContent = (data.totalDistanceMeters / 1000).toFixed(0) + ' km';
  document.getElementById('sum-time').textContent = formatSeconds(data.totalTravelTimeSeconds);
  document.getElementById('sum-delay').textContent = data.totalTrafficDelaySeconds > 60
    ? '+' + formatSeconds(data.totalTrafficDelaySeconds) : 'Geen';
  document.getElementById('sum-eta').textContent = data.arrivalTime
    ? new Date(data.arrivalTime).toLocaleTimeString('nl-BE', { hour: '2-digit', minute: '2-digit' }) : '—';
}

function clearRouteSummary() {
  ['sum-distance','sum-time','sum-delay','sum-eta'].forEach(id => document.getElementById(id).textContent = '—');
}

function formatSeconds(s) {
  const h = Math.floor(s / 3600), m = Math.round((s % 3600) / 60);
  return h > 0 ? `${h}u ${m}min` : `${m} min`;
}

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
function setTab(tab) {
  currentTab = tab;
  ['tickets','planning','kalender'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });

  const list = document.getElementById('ticket-list');
  const cal = document.getElementById('calendar-view');
  const filterRow = document.getElementById('filter-row');
  const statusFilter = document.getElementById('status-filter');

  // Show/hide search & status filter only on tickets tab
  filterRow.style.display = tab === 'tickets' ? '' : 'none';
  statusFilter.style.display = tab === 'tickets' ? '' : 'none';

  if (tab === 'kalender') {
    list.style.display = 'none';
    cal.style.display = 'flex';
    renderCalendar();
  } else {
    list.style.display = '';
    cal.style.display = 'none';
    if (tab === 'tickets') renderTickets(filterCurrentTickets());
    else renderPlanningTab();
  }
}

// ══════════════════════════════════════════════
// KALENDER
// ══════════════════════════════════════════════
function renderCalendar() {
  const cal = document.getElementById('calendar-view');
  cal.innerHTML = '';

  const today = new Date(); today.setHours(0,0,0,0);
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - (today.getDay() + 6) % 7 + calendarWeekOffset * 7);
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);

  const fmt = d => d.toLocaleDateString('nl-BE', { day: 'numeric', month: 'short' });
  const nav = document.createElement('div');
  nav.className = 'cal-week-nav';
  nav.innerHTML = `<button onclick="calWeek(-1)">‹</button><span>${fmt(weekStart)} – ${fmt(weekEnd)}</span><button onclick="calWeek(1)">›</button>`;
  cal.appendChild(nav);

  // Group by due date
  const byDate = {};
  allPlannedTickets.forEach(t => {
    if (!t.dueDate) { (byDate['none'] = byDate['none'] || []).push(t); return; }
    const d = new Date(t.dueDate); d.setHours(0,0,0,0);
    const key = d.toISOString().split('T')[0];
    (byDate[key] = byDate[key] || []).push(t);
  });

  let hasAny = false;
  for (let i = 0; i < 7; i++) {
    const day = new Date(weekStart); day.setDate(weekStart.getDate() + i);
    const key = day.toISOString().split('T')[0];
    const tickets = byDate[key];
    if (!tickets?.length) continue;
    hasAny = true;

    const isToday = day.getTime() === today.getTime();
    const isPast = day.getTime() < today.getTime();

    const group = document.createElement('div');
    group.className = 'cal-day-group';
    const hdr = document.createElement('div');
    hdr.className = `cal-day-header${isToday ? ' today' : isPast ? ' overdue' : ''}`;
    hdr.textContent = (isToday ? '⬤ ' : '') + day.toLocaleDateString('nl-BE', { weekday: 'long', day: 'numeric', month: 'long' });
    group.appendChild(hdr);

    tickets.forEach(t => {
      const card = document.createElement('div');
      card.className = 'cal-ticket';
      card.innerHTML = `
        <div class="cal-ticket-subject">${t.subject || ''}</div>
        <div class="cal-ticket-meta">${[t.account, t.contact].filter(Boolean).join(' · ')}</div>
        ${t.status ? `<span class="cal-ticket-status">${t.status}</span>` : ''}
      `;
      group.appendChild(card);
    });
    cal.appendChild(group);
  }

  if (byDate['none']?.length && calendarWeekOffset === 0) {
    hasAny = true;
    const group = document.createElement('div');
    group.className = 'cal-day-group';
    const hdr = document.createElement('div');
    hdr.className = 'cal-day-header';
    hdr.textContent = '📌 Geen vervaldatum';
    group.appendChild(hdr);
    byDate['none'].forEach(t => {
      const card = document.createElement('div');
      card.className = 'cal-ticket';
      card.innerHTML = `<div class="cal-ticket-subject">${t.subject || ''}</div><div class="cal-ticket-meta">${[t.account, t.contact].filter(Boolean).join(' · ')}</div>`;
      group.appendChild(card);
    });
    cal.appendChild(group);
  }

  if (!hasAny) {
    const empty = document.createElement('div');
    empty.className = 'cal-empty';
    empty.textContent = 'Geen geplande service deze week';
    cal.appendChild(empty);
  }
}

function calWeek(dir) { calendarWeekOffset += dir; renderCalendar(); }

// ══════════════════════════════════════════════
// ADRES MODAL
// ══════════════════════════════════════════════
function openAddressModal(ticketId, callback) {
  editingTicketId = ticketId;
  editCallback = callback || null;
  const ticket = allTickets.find(t => t.id === ticketId);
  document.getElementById('address-input').value = ticket?.address || '';
  document.getElementById('address-overlay').classList.add('open');
  setTimeout(() => document.getElementById('address-input').focus(), 100);
}

function closeAddressModal(e) {
  if (e && e.target !== document.getElementById('address-overlay')) return;
  document.getElementById('address-overlay').classList.remove('open');
  editingTicketId = null; editCallback = null;
}

function saveAddress() {
  const address = document.getElementById('address-input').value.trim();
  if (!address) return;
  const ticket = allTickets.find(t => t.id === editingTicketId);
  if (ticket) {
    ticket.address = address;
    addressOverrides[editingTicketId] = address;
    localStorage.setItem('addressOverrides', JSON.stringify(addressOverrides));
  }
  const inPlanning = planningTickets.find(p => p.ticket.id === editingTicketId);
  if (inPlanning) { inPlanning.address = address; inPlanning._lat = null; inPlanning._lon = null; }
  document.getElementById('address-overlay').classList.remove('open');
  if (editCallback) { editCallback(); editCallback = null; }
  else afterPlanningChange();
  editingTicketId = null;
}

document.getElementById('address-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveAddress();
  if (e.key === 'Escape') closeAddressModal();
});

// ══════════════════════════════════════════════
// OPLOSSING MODAL
// ══════════════════════════════════════════════
function openCommentFromBtn(btn) {
  openCommentModal(btn.dataset.ticketId, btn.dataset.subject);
}

function openCommentModal(ticketId, subject) {
  commentTicketId = ticketId;
  document.getElementById('comment-ticket-label').textContent = subject || '';
  document.getElementById('comment-textarea').value = '';
  document.getElementById('comment-overlay').classList.add('open');
  setTimeout(() => document.getElementById('comment-textarea').focus(), 100);
}

function closeCommentModal(e) {
  if (e && e.target !== document.getElementById('comment-overlay')) return;
  document.getElementById('comment-overlay').classList.remove('open');
  commentTicketId = null;
}

async function submitComment() {
  const content = document.getElementById('comment-textarea').value.trim();
  if (!content || !commentTicketId) return;
  document.getElementById('comment-overlay').classList.remove('open');
  showLoading('Oplossing opslaan...');
  try {
    const res = await fetch('/api/comment', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticketId: commentTicketId, content }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    toast('✓ Oplossing opgeslagen in Zoho');
  } catch (err) {
    toast('❌ ' + err.message, 4000);
  } finally {
    hideLoading(); commentTicketId = null;
  }
}

document.getElementById('comment-textarea').addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCommentModal();
});

// ══════════════════════════════════════════════
// PERSISTENCE
// ══════════════════════════════════════════════
function savePlanningForDate() {
  const date = document.getElementById('date-picker').value;
  savedPlanning[date] = planningTickets.map(p => ({ id: p.ticket.id, address: p.address }));
  localStorage.setItem('savedPlanning', JSON.stringify(savedPlanning));
}

function loadSavedPlanningForDate(date) {
  const saved = savedPlanning[date] || [];
  planningTickets = saved.map(s => {
    const ticket = allTickets.find(t => t.id === s.id);
    return ticket ? { ticket, address: s.address } : null;
  }).filter(Boolean);
  afterPlanningChange();
}

// ══════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════
function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg || 'Laden...';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

let toastTimer;
function toast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}
</script>
