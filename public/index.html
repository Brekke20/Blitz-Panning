<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Blitz Planning</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #252540;
      --border: #2e2e50; --accent: #f59e0b; --green: #10b981;
      --red: #ef4444; --text: #e2e8f0; --muted: #94a3b8; --radius: 10px;
    }
    html, body { min-height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* Header */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 20px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .refresh-btn {
      margin-left: auto; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 7px 14px; border-radius: 6px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
    }
    .refresh-btn:active { opacity: 0.7; }

    /* Tabs */
    .tabs {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--surface); position: sticky; top: 53px; z-index: 9;
    }
    .tab {
      flex: 1; padding: 13px 8px; text-align: center; font-size: 0.85rem;
      font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Content */
    .tab-content { display: none; padding: 12px; max-width: 700px; margin: 0 auto; }
    .tab-content.active { display: block; }

    /* Ticket card */
    .ticket {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .ticket:hover { border-color: var(--accent); }
    .ticket:active { opacity: 0.8; }
    .ticket-top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; flex-wrap: wrap; }
    .ticket-number { font-size: 0.75rem; font-weight: 700; color: var(--accent); font-family: monospace; }
    .status-tag {
      font-size: 0.7rem; font-weight: 600; padding: 2px 7px; border-radius: 4px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    }
    .ticket-subject { font-weight: 600; font-size: 0.92rem; line-height: 1.35; margin-bottom: 4px; }
    .ticket-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }
    .ticket-address {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; padding: 6px 10px; border-radius: 6px; background: var(--surface2);
    }
    .ticket-address.ok { color: var(--text); }
    .ticket-address.missing { color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

    /* Empty / loading */
    .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 0.9rem; }
    .count-badge {
      display: inline-block; background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 0.72rem; padding: 1px 6px;
      border-radius: 10px; margin-left: 5px; font-weight: 700;
    }

    /* ── Detail modal ── */
    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 100; align-items: flex-end; justify-content: center; padding: 0;
    }
    .overlay.open { display: flex; }

    /* Sheet van onderaf op mobiel, gecentreerd op desktop */
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px 16px 0 0; padding: 0; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
    }
    @media (min-width: 600px) {
      .overlay { align-items: center; padding: 20px; }
      .modal { border-radius: 14px; max-height: 85vh; }
    }

    .modal-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }
    .modal-ticket-num {
      font-size: 0.75rem; font-weight: 700; color: var(--accent);
      font-family: monospace; margin-bottom: 4px;
    }
    .modal-title { font-size: 1rem; font-weight: 700; line-height: 1.35; }
    .modal-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .badge {
      font-size: 0.7rem; font-weight: 600; padding: 3px 8px; border-radius: 4px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    }
    .badge.prio-high   { background: #7f1d1d; color: #fca5a5; border-color: #7f1d1d; }
    .badge.prio-medium { background: #78350f; color: #fcd34d; border-color: #78350f; }
    .badge.prio-low    { background: #14532d; color: #86efac; border-color: #14532d; }

    .modal-body { padding: 16px 20px; }
    .info-section { margin-bottom: 18px; }
    .info-section-title {
      font-size: 0.7rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
    }
    .info-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
    .info-label { font-size: 0.78rem; color: var(--muted); min-width: 90px; flex-shrink: 0; padding-top: 1px; }
    .info-value { font-size: 0.85rem; color: var(--text); flex: 1; word-break: break-word; }
    .info-value.missing { color: var(--red); }
    .info-value a { color: var(--accent); text-decoration: none; }
    .info-value a:hover { text-decoration: underline; }

    .modal-footer {
      padding: 14px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; justify-content: flex-end;
      position: sticky; bottom: 0; background: var(--surface);
    }
    .btn-close {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 9px 18px; border-radius: 7px; font-size: 0.85rem; cursor: pointer;
    }
    .btn-oplossing {
      background: var(--accent); border: none; color: #000;
      padding: 9px 18px; border-radius: 7px; font-size: 0.85rem;
      font-weight: 700; cursor: pointer;
    }
    .btn-oplossing:active, .btn-close:active { opacity: 0.75; }

    /* ── Oplossing modal ── */
    #opl-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    #opl-overlay.open { display: flex; }
    #opl-modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 22px; width: 100%; max-width: 460px;
    }
    #opl-modal h3 { font-size: 1rem; margin-bottom: 4px; }
    #opl-modal .sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; }
    #opl-modal textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 12px; border-radius: 6px;
      font-size: 0.9rem; font-family: inherit; min-height: 100px;
      resize: vertical; margin-bottom: 14px;
    }
    .opl-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; cursor: pointer;
    }
    .btn-save {
      background: var(--accent); border: none; color: #000;
      padding: 8px 18px; border-radius: 6px; font-size: 0.85rem;
      font-weight: 700; cursor: pointer;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 20px; border-radius: 8px;
      font-size: 0.85rem; z-index: 300; opacity: 0;
      transition: opacity 0.2s; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>⚡ Blitz Planning</h1>
  <button class="refresh-btn" onclick="loadTickets()">🔄 Vernieuwen</button>
</header>

<div class="tabs">
  <div class="tab active" onclick="setTab('plannen')" id="tab-plannen">
    Te plannen <span class="count-badge" id="count-plannen">0</span>
  </div>
  <div class="tab" onclick="setTab('gepland')" id="tab-gepland">
    Gepland <span class="count-badge" id="count-gepland">0</span>
  </div>
</div>

<div class="tab-content active" id="view-plannen">
  <div class="empty" id="empty-plannen">Laden...</div>
</div>
<div class="tab-content" id="view-gepland">
  <div class="empty" id="empty-gepland">Laden...</div>
</div>

<!-- Detail modal -->
<div class="overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="modal" id="detail-modal">
    <div class="modal-header">
      <div class="modal-ticket-num" id="d-number"></div>
      <div class="modal-title" id="d-title"></div>
      <div class="modal-badges" id="d-badges"></div>
    </div>
    <div class="modal-body">
      <div class="info-section" id="d-klant-section">
        <div class="info-section-title">Klantgegevens</div>
        <div id="d-klant-rows"></div>
      </div>
      <div class="info-section" id="d-ticket-section">
        <div class="info-section-title">Ticketdetails</div>
        <div id="d-ticket-rows"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-close" onclick="closeDetail()">Sluiten</button>
      <button class="btn-oplossing" id="d-opl-btn" onclick="openOplossing()">✏️ Oplossing</button>
    </div>
  </div>
</div>

<!-- Oplossing modal -->
<div id="opl-overlay" onclick="closeOplossing(event)">
  <div id="opl-modal">
    <h3>✅ Oplossing invoeren</h3>
    <div class="sub" id="opl-label"></div>
    <textarea id="opl-text" placeholder="Beschrijf de uitgevoerde interventie of oplossing..."></textarea>
    <div class="opl-btns">
      <button class="btn-cancel" onclick="closeOplossing()">Annuleren</button>
      <button class="btn-save" onclick="saveOplossing()">Opslaan in Zoho</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let teplannen = [];
let gepland   = [];
let activeTicket = null;

// ── Init ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadTickets();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
});

// ── Data ──────────────────────────────────────────
async function loadTickets() {
  ['plannen','gepland'].forEach(t => document.getElementById('empty-' + t).textContent = 'Laden...');
  try {
    const res = await fetch('/api/tickets');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    teplannen = data.tickets || [];
    gepland   = data.plannedTickets || [];
    document.getElementById('count-plannen').textContent = teplannen.length;
    document.getElementById('count-gepland').textContent = gepland.length;
    render('plannen', teplannen);
    render('gepland', gepland);
  } catch (err) {
    toast('❌ ' + err.message, 4000);
    ['plannen','gepland'].forEach(t => document.getElementById('empty-' + t).textContent = 'Kon tickets niet laden.');
  }
}

// ── Render ticket cards ───────────────────────────
function render(tab, tickets) {
  const view  = document.getElementById('view-' + tab);
  const empty = document.getElementById('empty-' + tab);
  [...view.querySelectorAll('.ticket')].forEach(el => el.remove());

  if (tickets.length === 0) {
    empty.textContent = tab === 'plannen' ? 'Geen tickets te plannen.' : 'Geen geplande tickets.';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  tickets.forEach(t => {
    const card = document.createElement('div');
    card.className = 'ticket';
    card.onclick = () => openDetail(t);

    const meta = [t.account, t.contact].filter(Boolean).join(' · ');

    card.innerHTML = `
      <div class="ticket-top">
        <span class="ticket-number">#${t.number}</span>
        <span class="status-tag">${t.status}</span>
      </div>
      <div class="ticket-subject">${t.subject || '—'}</div>
      ${meta ? `<div class="ticket-meta">${meta}</div>` : ''}
      <div class="ticket-address ${t.hasAddress ? 'ok' : 'missing'}">
        ${t.hasAddress ? '📍 ' + t.address : '⚠️ Geen adres bekend'}
      </div>
    `;
    view.appendChild(card);
  });
}

// ── Tabs ──────────────────────────────────────────
function setTab(tab) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
}

// ── Detail modal ──────────────────────────────────
function openDetail(t) {
  activeTicket = t;

  document.getElementById('d-number').textContent = '#' + t.number;
  document.getElementById('d-title').textContent  = t.subject || '—';

  // Badges
  const badges = document.getElementById('d-badges');
  badges.innerHTML = '';
  if (t.status) badges.innerHTML += `<span class="badge">${t.status}</span>`;
  if (t.priority) {
    const p = t.priority.toLowerCase();
    badges.innerHTML += `<span class="badge prio-${p}">${t.priority}</span>`;
  }

  // Klantgegevens
  const klantRows = [
    t.contact && { label: 'Contact',   value: t.contact },
    t.account && { label: 'Bedrijf',   value: t.account },
    t.email   && { label: 'E-mail',    value: `<a href="mailto:${t.email}">${t.email}</a>` },
    t.phone   && { label: 'Telefoon',  value: `<a href="tel:${t.phone}">${t.phone}</a>` },
    {
      label: 'Adres',
      value: t.hasAddress ? t.address : null,
      missing: !t.hasAddress,
      missingText: 'Geen adres bekend',
    },
  ].filter(Boolean);

  document.getElementById('d-klant-rows').innerHTML = klantRows.map(r =>
    `<div class="info-row">
      <span class="info-label">${r.label}</span>
      <span class="info-value${r.missing ? ' missing' : ''}">${r.missing ? r.missingText : r.value}</span>
    </div>`
  ).join('');

  // Ticketdetails
  const ticketRows = [
    t.dueDate     && { label: 'Vervaldatum', value: formatDate(t.dueDate) },
    t.createdTime && { label: 'Aangemaakt',  value: formatDate(t.createdTime) },
  ].filter(Boolean);

  document.getElementById('d-ticket-rows').innerHTML = ticketRows.length
    ? ticketRows.map(r =>
        `<div class="info-row">
          <span class="info-label">${r.label}</span>
          <span class="info-value">${r.value}</span>
        </div>`
      ).join('')
    : '<div class="info-row"><span class="info-value" style="color:var(--muted)">—</span></div>';

  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(e) {
  if (e && e.target !== document.getElementById('detail-overlay')) return;
  document.getElementById('detail-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeOplossing();
    closeDetail();
  }
});

// ── Oplossing modal ───────────────────────────────
function openOplossing() {
  if (!activeTicket) return;
  document.getElementById('opl-label').textContent = activeTicket.subject || '';
  document.getElementById('opl-text').value = '';
  document.getElementById('opl-overlay').classList.add('open');
  setTimeout(() => document.getElementById('opl-text').focus(), 80);
}

function closeOplossing(e) {
  if (e && e.target !== document.getElementById('opl-overlay')) return;
  document.getElementById('opl-overlay').classList.remove('open');
}

async function saveOplossing() {
  const content = document.getElementById('opl-text').value.trim();
  if (!content || !activeTicket) return;
  document.getElementById('opl-overlay').classList.remove('open');
  try {
    const res = await fetch('/api/comment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticketId: activeTicket.id, content }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    toast('✓ Oplossing opgeslagen');
  } catch (err) {
    toast('❌ ' + err.message, 4000);
  }
}

// ── Helpers ───────────────────────────────────────
function formatDate(str) {
  return new Date(str).toLocaleDateString('nl-BE', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
}

let toastTimer;
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}
</script>
</body>
</html>
