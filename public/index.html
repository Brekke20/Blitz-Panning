<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f59e0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Blitz Planning</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #252540;
      --border: #2e2e50; --accent: #f59e0b; --green: #10b981;
      --red: #ef4444; --text: #e2e8f0; --muted: #94a3b8; --radius: 10px;
    }
    html, body { min-height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* Header */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 20px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .refresh-btn {
      margin-left: auto; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 7px 14px; border-radius: 6px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
    }
    .refresh-btn:active { opacity: 0.7; }

    /* Tabs */
    .tabs {
      display: flex; border-bottom: 1px solid var(--border);
      background: var(--surface); position: sticky; top: 53px; z-index: 9;
    }
    .tab {
      flex: 1; padding: 13px 8px; text-align: center; font-size: 0.85rem;
      font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Content */
    .tab-content { display: none; padding: 12px; max-width: 700px; margin: 0 auto; }
    .tab-content.active { display: block; }

    /* Ticket card */
    .ticket {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px;
    }
    .ticket-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .ticket-number { font-size: 0.75rem; font-weight: 700; color: var(--accent); font-family: monospace; white-space: nowrap; }
    .status-tag {
      font-size: 0.7rem; font-weight: 600; padding: 2px 7px; border-radius: 4px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    }
    .ticket-subject { font-weight: 600; font-size: 0.92rem; line-height: 1.35; margin-bottom: 4px; }
    .ticket-account { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }

    .ticket-address {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; padding: 6px 10px; border-radius: 6px;
      background: var(--surface2); margin-bottom: 10px;
    }
    .ticket-address.ok { color: var(--text); }
    .ticket-address.missing { color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .ticket-address .addr-icon { flex-shrink: 0; }

    .ticket-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .ticket-due { font-size: 0.75rem; color: var(--muted); }
    .ticket-due.overdue { color: var(--red); font-weight: 600; }

    .btn-oplossing {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .btn-oplossing:active { opacity: 0.7; }

    /* Empty / loading */
    .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 0.9rem; }
    .count-badge {
      display: inline-block; background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 0.72rem; padding: 1px 6px;
      border-radius: 10px; margin-left: 5px; font-weight: 700;
    }

    /* Modal */
    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 100; align-items: center; justify-content: center; padding: 20px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 22px; width: 100%; max-width: 460px;
    }
    .modal h3 { font-size: 1rem; margin-bottom: 6px; }
    .modal .subtitle { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; }
    .modal textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 12px; border-radius: 6px;
      font-size: 0.9rem; font-family: inherit; min-height: 100px;
      resize: vertical; margin-bottom: 14px;
    }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; cursor: pointer;
    }
    .btn-save {
      background: var(--accent); border: none; color: #000;
      padding: 8px 18px; border-radius: 6px; font-size: 0.85rem;
      font-weight: 700; cursor: pointer;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 20px; border-radius: 8px;
      font-size: 0.85rem; z-index: 200; opacity: 0;
      transition: opacity 0.2s; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>⚡ Blitz Planning</h1>
  <button class="refresh-btn" onclick="loadTickets()">🔄 Vernieuwen</button>
</header>

<div class="tabs">
  <div class="tab active" onclick="setTab('plannen')" id="tab-plannen">
    Te plannen <span class="count-badge" id="count-plannen">0</span>
  </div>
  <div class="tab" onclick="setTab('gepland')" id="tab-gepland">
    Gepland <span class="count-badge" id="count-gepland">0</span>
  </div>
</div>

<div class="tab-content active" id="view-plannen">
  <div class="empty" id="empty-plannen">Laden...</div>
</div>

<div class="tab-content" id="view-gepland">
  <div class="empty" id="empty-gepland">Laden...</div>
</div>

<!-- Oplossing modal -->
<div class="overlay" id="oplossing-overlay" onclick="closeModal(event)">
  <div class="modal">
    <h3>✅ Oplossing invoeren</h3>
    <div class="subtitle" id="modal-label"></div>
    <textarea id="modal-text" placeholder="Beschrijf de uitgevoerde interventie of oplossing..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
      <button class="btn-save" onclick="saveOplossing()">Opslaan in Zoho</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let teplannen = [];
let gepland = [];
let activeTicketId = null;
let currentTab = 'plannen';

// ── Init ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadTickets();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
});

// ── Data ──────────────────────────────────────────
async function loadTickets() {
  document.getElementById('empty-plannen').textContent = 'Laden...';
  document.getElementById('empty-gepland').textContent = 'Laden...';
  try {
    const res = await fetch('/api/tickets');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    teplannen = data.tickets || [];
    gepland   = data.plannedTickets || [];
    document.getElementById('count-plannen').textContent = teplannen.length;
    document.getElementById('count-gepland').textContent = gepland.length;
    render('plannen', teplannen);
    render('gepland', gepland);
  } catch (err) {
    toast('❌ ' + err.message, 4000);
    document.getElementById('empty-plannen').textContent = 'Kon tickets niet laden.';
    document.getElementById('empty-gepland').textContent = 'Kon tickets niet laden.';
  }
}

// ── Render ────────────────────────────────────────
function render(tab, tickets) {
  const view  = document.getElementById('view-' + tab);
  const empty = document.getElementById('empty-' + tab);

  if (tickets.length === 0) {
    empty.textContent = tab === 'plannen' ? 'Geen tickets te plannen.' : 'Geen geplande tickets.';
    empty.style.display = '';
    // Remove old cards
    [...view.querySelectorAll('.ticket')].forEach(el => el.remove());
    return;
  }
  empty.style.display = 'none';
  // Remove old cards
  [...view.querySelectorAll('.ticket')].forEach(el => el.remove());

  tickets.forEach(t => {
    const card = document.createElement('div');
    card.className = 'ticket';

    const safeSubject = (t.subject || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');
    const due = t.dueDate ? formatDue(t.dueDate) : null;
    const isOverdue = t.dueDate && new Date(t.dueDate) < new Date();

    card.innerHTML = `
      <div class="ticket-top">
        <span class="ticket-number">#${t.number}</span>
        <span class="status-tag">${t.status}</span>
      </div>
      <div class="ticket-subject">${t.subject || '—'}</div>
      ${(t.account || t.contact)
        ? `<div class="ticket-account">${[t.account, t.contact].filter(Boolean).join(' · ')}</div>`
        : ''}
      <div class="ticket-address ${t.hasAddress ? 'ok' : 'missing'}">
        <span class="addr-icon">${t.hasAddress ? '📍' : '⚠️'}</span>
        <span>${t.hasAddress ? t.address : 'Geen adres bekend in klantinformatie'}</span>
      </div>
      <div class="ticket-footer">
        ${due ? `<span class="ticket-due${isOverdue ? ' overdue' : ''}">${isOverdue ? '⚠️ ' : ''}${due}</span>` : '<span></span>'}
        <button class="btn-oplossing" data-ticket-id="${t.id}" data-subject="${safeSubject}" onclick="openOplossing(this)">✏️ Oplossing</button>
      </div>
    `;
    view.appendChild(card);
  });
}

function formatDue(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('nl-BE', { weekday: 'short', day: 'numeric', month: 'short' });
}

// ── Tabs ──────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
}

// ── Oplossing modal ───────────────────────────────
function openOplossing(btn) {
  activeTicketId = btn.dataset.ticketId;
  document.getElementById('modal-label').textContent = btn.dataset.subject;
  document.getElementById('modal-text').value = '';
  document.getElementById('oplossing-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-text').focus(), 80);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('oplossing-overlay')) return;
  document.getElementById('oplossing-overlay').classList.remove('open');
  activeTicketId = null;
}

document.getElementById('modal-text').addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

async function saveOplossing() {
  const content = document.getElementById('modal-text').value.trim();
  if (!content || !activeTicketId) return;
  document.getElementById('oplossing-overlay').classList.remove('open');
  try {
    const res = await fetch('/api/comment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticketId: activeTicketId, content }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    toast('✓ Oplossing opgeslagen');
  } catch (err) {
    toast('❌ ' + err.message, 4000);
  } finally {
    activeTicketId = null;
  }
}

// ── Toast ─────────────────────────────────────────
let toastTimer;
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}
</script>
</body>
</html>
